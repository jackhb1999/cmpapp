  # Use to create Remote Compose documents
  - androidx.compose.remote:remote-creation:1.0.0-alpha03
  - androidx.compose.remote:remote-creation-core:1.0.0-alpha03
  - androidx.compose.remote:remote-creation-compose:1.0.0-alpha03
  # Use to render a Remote Compose document
  - androidx.compose.remote:remote-player-core:1.0.0-alpha03
  - androidx.compose.remote:remote-player-view:1.0.0-alpha03
  - androidx.compose.remote:remote-tooling-preview:1.0.0-alpha03
  - androidx.compose.remote:remote-creation-android:1.0.0-alpha03
  - $libs.kotlinx.coroutines.android


settings:
  compose:
    enabled: true
    version: 1.10.0
  kotlin:
    serialization: enabled

