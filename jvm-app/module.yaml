product: jvm/app

dependencies:
  - ../common
  - ../shared
  - $compose.desktop.currentOs





settings:
  compose:
    enabled: true
    experimental:
      hotReload:
        version: 1.0.0-rc3
    resources:
      packageName: com.rustob.gen
    version: 1.10.0
  kotlin:
    serialization: enabled




repositories:
  - https://repo.spring.io/ui/native/release
  - url: https://dl.google.com/dl/android/maven2/
  - id: jitpack
    url: https://jitpack.io