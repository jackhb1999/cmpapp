product: jvm/app

dependencies:
  - ../common
  - ../shared
  - $compose.desktop.currentOs
  - $libs.compose.materialIconsCore
  - $libs.compose.materialIconsExtended
  - $compose.components.resources
  - $libs.androidx.lifecycle.viewmodel.compose
  - $libs.androidx.lifecycle.runtime
  - $libs.voyager.navigator
  - $libs.voyager.tab.navigator
  - $libs.voyager.transitions
  - $libs.ktor.client.core
  - $libs.ktor.client.cio
  - $libs.ktor.client.json
  - $libs.ktor.client.contentNegotiation
  - $libs.ktor.serialization.kotlinx.json
  - $libs.ktor.client.logging
  - $libs.koin.core
  - $libs.koin.compose
  - $libs.koin.compose.viewModel
  - $libs.kotlinx.coroutines.core
  - $libs.kotlinx.coroutines.swing
  - io.github.dokar3:sonner:0.3.8
  - io.coil-kt.coil3:coil-compose:3.3.0
  - io.coil-kt.coil3:coil-network-okhttp:3.3.0
  - commons-codec:commons-codec:1.20.0
  - org.jetbrains.compose.material3:material3-window-size-class:1.7.3


settings:
