product: android/app

dependencies:
  - ../shared
  - $libs.compose.material3
  - $libs.compose.foundation
  - $libs.androidx.appcompat
  - $libs.androidx.activity.compose
  - $libs.androidx.datastore
  - $libs.androidx.datastore.core
  - androidx.compose.remote:remote-core:1.0.0-alpha03
